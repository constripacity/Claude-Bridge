<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Claude Bridge · Dashboard</title>
<style>
  /* Self-hosted fonts under fonts/ — no third-party CDN, so the dashboard
     loads with zero network requests outside this server. License files
     ship alongside the woff2 binaries (SIL Open Font License 1.1). */
  @font-face {
    font-family: 'Geist';
    font-style: normal;
    font-weight: 100 900;
    font-display: swap;
    src: url('fonts/Geist-Variable.woff2') format('woff2');
  }
  @font-face {
    font-family: 'IBM Plex Mono';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url('fonts/IBMPlexMono-Regular.woff2') format('woff2');
  }
  @font-face {
    font-family: 'IBM Plex Mono';
    font-style: normal;
    font-weight: 500;
    font-display: swap;
    src: url('fonts/IBMPlexMono-Medium.woff2') format('woff2');
  }
  @font-face {
    font-family: 'IBM Plex Mono';
    font-style: normal;
    font-weight: 600;
    font-display: swap;
    src: url('fonts/IBMPlexMono-SemiBold.woff2') format('woff2');
  }

  html, body { margin: 0; padding: 0; background: #0d1117; height: 100%; }
  body { font-family: 'Geist', -apple-system, system-ui, sans-serif; }
  #root { height: 100%; }
  :root {
    --bg-base:   #0d1117;
    --bg-card:   #161b22;
    --bg-elev:   #1c2333;
    --bg-deep:   #08090d;
    --hairline:  #21262d;
    --hairline-strong: #30363d;
    --blue:      #58a6ff;
    --blue-dim:  #1f4d8a;
    --green:     #3fb950;
    --green-dim: #1a5928;
    --amber:     #d97706;
    --amber-dim: #5a3009;
    --red:       #f85149;
    --magenta:   #bc8cff;
    --text:      #e6edf3;
    --text-mid:  #8b949e;
    --text-dim:  #6e7681;
    --text-faint:#484f58;
    --mono: 'IBM Plex Mono', 'Geist Mono', ui-monospace, Menlo, monospace;
    --sans: 'Geist', -apple-system, system-ui, sans-serif;
  }
  /* Scrollbar */
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: #21262d; border-radius: 4px; }
  *::-webkit-scrollbar-thumb:hover { background: #30363d; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"
        integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"
        integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
        integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
        crossorigin="anonymous"></script>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="dashboard-desktop.jsx"></script>
<script type="text/babel" src="dashboard-mobile.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
