name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      # Pinned to commit SHA, not the floating `@v4` tag, so a compromise of
      # the tag (or a malicious force-push on it) can't silently rewrite what
      # CI runs. Bump by replacing both the SHA and the trailing comment.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint with ruff
        run: ruff check claude_bridge tests/

      - name: Import check
        run: python -c "import claude_bridge; print(f'claude_bridge {claude_bridge.__version__} import OK')"

      - name: Run tests
        run: pytest -v
